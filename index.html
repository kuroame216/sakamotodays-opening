<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>SAKAMOTO DAYS 都心部 上映スケジュール</title>
  <style>
    :root {
      --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --color-text-primary: #111111;
      --color-text-secondary: #555555;
      --color-text-tertiary: #888888;
      --color-background-primary: #ffffff;
      --color-background-secondary: #f7f7f7;
      --color-border-secondary: #d6d6d6;
      --color-border-tertiary: #e5e5e5;
      --border-radius-sm: 4px;
      --border-radius-md: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 30px 0;
      background: var(--color-background-primary);
      color: var(--color-text-primary);
      font-family: var(--font-sans);
      /* 縦スクロールを確実にする */
      overflow-y: auto;
      overflow-x: hidden;
    }

    .page-title { text-align: center; margin-bottom: 24px; }
    .page-title-main { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; }
    .page-title-sub { font-size: 14px; color: var(--color-text-secondary); margin-top: 4px; }
    .signature { margin-top: 8px; font-size: 12px; }
    .signature a { color: #0066cc; text-decoration: none; }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .tab {
      padding: 8px 24px;
      border: 1px solid var(--color-border-secondary);
      background: #fff;
      cursor: pointer;
      border-radius: 20px;
      font-size: 14px;
      transition: all 0.2s;
    }
    .tab.active {
      background: var(--color-text-primary);
      color: #fff;
      border-color: var(--color-text-primary);
    }

    #filters {
      padding: 0 16px;
      max-width: 900px;
      margin: 0 auto 20px;
    }
    .filter-group {
      background: var(--color-background-secondary);
      padding: 12px;
      border-radius: var(--border-radius-md);
    }
    .filter-title { font-size: 12px; font-weight: bold; margin-bottom: 8px; color: var(--color-text-secondary); }
    .filter-buttons { display: flex; gap: 8px; margin-bottom: 12px; }
    .filter-buttons button {
      font-size: 11px;
      padding: 4px 12px;
      border: 1px solid var(--color-border-secondary);
      background: #fff;
      border-radius: 4px;
      cursor: pointer;
    }
    .area-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .area-list label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      cursor: pointer;
      background: #fff;
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid var(--color-border-tertiary);
    }

    #chart-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 16px;
    }

    #chart-wrap {
      position: relative;
      border: 1px solid var(--color-border-tertiary);
      background: #fff;
      overflow-x: auto;
      /* iOSでのスクロールを滑らかに */
      -webkit-overflow-scrolling: touch;
      /* 縦スクロールを邪魔しない設定 */
      touch-action: pan-y;
    }

    .time-axis {
      display: flex;
      height: 30px;
      border-bottom: 1px solid var(--color-border-tertiary);
      background: var(--color-background-secondary);
    }
    .time-slot {
      flex: none;
      width: 60px;
      font-size: 10px;
      color: var(--color-text-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 0.5px solid var(--color-border-tertiary);
    }

    .theater-row {
      display: flex;
      position: relative;
      height: 44px;
      border-bottom: 0.5px solid var(--color-border-tertiary);
    }
    .theater-name {
      flex: none;
      width: 140px;
      padding: 0 12px;
      display: flex;
      align-items: center;
      font-size: 11px;
      font-weight: bold;
      background: #fff;
      border-right: 1px solid var(--color-border-tertiary);
      position: sticky;
      left: 0;
      z-index: 10;
    }
    .timeline-area {
      flex: none;
      position: relative;
      width: 1080px; /* 18時間 * 60px */
      background-image: linear-gradient(to right, var(--color-border-tertiary) 0.5px, transparent 0.5px);
      background-size: 60px 100%;
    }

    .bar {
      position: absolute;
      height: 24px; /* 指で押しやすい高さに微増 */
      top: 10px;
      border-radius: 4px;
      font-size: 10px;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
      z-index: 5;
      /* 縦スクロールを許可 */
      touch-action: pan-y;
    }
    .bar:active { opacity: 0.7; }

    #tip {
      position: absolute;
      display: none;
      background: rgba(0,0,0,0.8);
      color: #fff;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 12px;
      z-index: 100;
      pointer-events: none;
      white-space: pre-line;
    }

    @media (max-width: 600px) {
      .theater-name { width: 100px; font-size: 10px; padding: 0 6px; }
      .timeline-area { width: 900px; background-size: 50px 100%; }
      .time-slot { width: 50px; }
      body { padding: 15px 0; }
    }
  </style>
</head>
<body>

<div class="page-title">
  <div class="page-title-main">SAKAMOTO DAYS</div>
  <div class="page-title-sub">上映スケジュール</div>
</div>

<div class="tabs">
  <div class="tab active" id="tab29">4/29</div>
  <div class="tab" id="tab30">4/30</div>
</div>

<div id="filters"></div>

<div id="chart-container">
  <div id="chart-wrap">
    <div class="time-axis" id="time-axis"></div>
    <div id="chart"></div>
  </div>
</div>

<div id="tip"></div>

<script>
const RAW_DATA = `
4/29,新宿,新宿ピカデリー,09:00,10:40
4/29,新宿,新宿ピカデリー,12:00,13:40
4/29,渋谷,TOHOシネマズ渋谷,10:00,11:40
4/29,渋谷,TOHOシネマズ渋谷,14:30,16:10
4/30,新宿,新宿ピカデリー,10:00,11:40
4/30,池袋,グランドシネマサンシャイン池袋,11:00,12:40
`;

const AREA_ORDER = ["新宿", "渋谷", "池袋", "銀座", "六本木"];
const START_HOUR = 8;
const HOURS = 18;

let currentDay = '4/29';
let activeAreas = new Set(AREA_ORDER);

const data = RAW_DATA.trim().split('\n').map(line => {
  const [day, area, theater, start, end] = line.split(',');
  return { day, area, theater, start, end };
});

function getMinutes(timeStr) {
  const [h, m] = timeStr.split(':').map(Number);
  return h * 60 + m;
}

function renderFilters() {
  const wrap = document.getElementById('filters');
  const areas = [...new Set(data.map(d => d.area))].sort((a,b) => AREA_ORDER.indexOf(a) - AREA_ORDER.indexOf(b));
  
  let html = `<div class="filter-group">`;
  html += `<div class="filter-title">エリア絞り込み</div>`;
  html += `<div class="filter-buttons"><button id="all-on">すべて選択</button><button id="all-off">解除</button></div>`;
  html += `<div class="area-list">`;
  html += areas.map(a => 
    `<label><input type="checkbox" data-area="${a}" ${activeAreas.has(a) ? 'checked' : ''}><span>${a}</span></label>`
  ).join('');
  html += `</div></div>`;
  wrap.innerHTML = html;

  wrap.querySelectorAll('[data-area]').forEach(input => {
    input.addEventListener('change', () => {
      if (input.checked) activeAreas.add(input.dataset.area);
      else activeAreas.delete(input.dataset.area);
      render();
    });
  });

  document.getElementById('all-on').onclick = () => { activeAreas = new Set(AREA_ORDER); renderFilters(); render(); };
  document.getElementById('all-off').onclick = () => { activeAreas = new Set(); renderFilters(); render(); };
}

function render() {
  // 時間軸
  const axis = document.getElementById('time-axis');
  const slotWidth = window.innerWidth <= 600 ? 50 : 60;
  axis.innerHTML = `<div style="width:${window.innerWidth <= 600 ? 100 : 140}px; flex:none;"></div>` + 
    Array.from({length: HOURS}, (_, i) => `<div class="time-slot" style="width:${slotWidth}px">${START_HOUR + i}:00</div>`).join('');

  // チャート本体
  const chart = document.getElementById('chart');
  const filtered = data.filter(d => d.day === currentDay && activeAreas.has(d.area));
  const theaters = [...new Set(filtered.map(d => d.theater))];

  chart.innerHTML = theaters.map(t => {
    const tData = filtered.filter(d => d.theater === t);
    return `
      <div class="theater-row">
        <div class="theater-name">${t}</div>
        <div class="timeline-area" style="width:${slotWidth * HOURS}px; background-size:${slotWidth}px 100%;">
          ${tData.map(d => {
            const left = (getMinutes(d.start) - START_HOUR * 60) * (slotWidth / 60);
            const width = (getMinutes(d.end) - getMinutes(d.start)) * (slotWidth / 60);
            return `<div class="bar" style="left:${left}px; width:${width}px; background:#e11d48;" 
                     data-tip="${d.theater}\n${d.start} - ${d.end}"></div>`;
          }).join('')}
        </div>
      </div>
    `;
  }).join('');

  // ツールチップ制御（スマホでは非表示にしてスクロールを優先）
  const tip = document.getElementById('tip');
  const isTouch = 'ontouchstart' in window;

  if (!isTouch) {
    document.querySelectorAll('.bar').forEach(bar => {
      bar.onmouseenter = (e) => {
        tip.textContent = bar.dataset.tip;
        tip.style.display = 'block';
      };
      bar.onmousemove = (e) => {
        tip.style.left = (e.pageX + 10) + 'px';
        tip.style.top = (e.pageY + 10) + 'px';
      };
      bar.onmouseleave = () => tip.style.display = 'none';
    });
  }
}

document.getElementById('tab29').onclick = function() {
  currentDay = '4/29';
  this.classList.add('active');
  document.getElementById('tab30').classList.remove('active');
  render();
};
document.getElementById('tab30').onclick = function() {
  currentDay = '4/30';
  this.classList.add('active');
  document.getElementById('tab29').classList.remove('active');
  render();
};

window.onresize = render;
renderFilters();
render();
</script>

</body>
</html>
