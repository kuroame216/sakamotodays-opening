  return { start: m[1], end: m[2], type: m[3] || '通常' };
}

let currentDay = '4/29';
let activeAreas = new Set(AREA_ORDER);

const START_HOUR = 7;
const END_HOUR = 28;
const AREA_W = 64;
const THEATER_W = 196;
const HOUR_W = 48;

// 行高: 通常行=32px、劇場の1行目=42px
const ROW_H_NORMAL = 32;
const ROW_H_FIRST = 42;
const BAR_H = 16;

function buildTheaterRows(theater) {
  const groups = { '通常': [], '特別': [], '舞台挨拶': [] };
  theater.shows.forEach(s => {
    const p = parseShow(s);
    if (!p) return;
    groups[classify(p.type)].push(p);
  });
  const rows = [];
  if (groups['舞台挨拶'].length > 0) rows.push({kind:'舞台挨拶', shows: groups['舞台挨拶']});
  if (groups['通常'].length > 0) rows.push({kind:'通常', shows: groups['通常']});
  if (groups['特別'].length > 0) rows.push({kind:'特別', shows: groups['特別']});
  return rows;
}

function stageBgHtml() {
  const ranges = STAGE_TIMES[currentDay] || [];
  return ranges.map(([s, e]) => {
    const sMin = toMin(s) - START_HOUR * 60;
    const eMin = toMin(e) - START_HOUR * 60;
    const left = (sMin / 60) * HOUR_W;
    const width = ((eMin - sMin) / 60) * HOUR_W;
    return `<div class="stage-bg" style="left: ${left}px; width: ${width}px;"></div>`;
  }).join('');
}

function render() {
  const sorted = [...DATA[currentDay]].sort((a, b) => AREA_ORDER.indexOf(a.area) - AREA_ORDER.indexOf(b.area));
  const theaters = sorted.filter(r => activeAreas.has(r.area));
  const chart = document.getElementById('chart');
  const totalHours = END_HOUR - START_HOUR;
  const chartWidth = AREA_W + THEATER_W + totalHours * HOUR_W;

  let html = '';
  html += `<div style="display: flex; min-width: ${chartWidth}px; border-bottom: 0.5px solid var(--color-border-tertiary); background: #F7F7F7;">`;
  html += `<div class="header-cell" style="width: ${AREA_W}px; flex-shrink: 0; border-right: 0.5px solid var(--color-border-tertiary);">地域</div>`;
  html += `<div class="header-cell" style="width: ${THEATER_W}px; flex-shrink: 0;">劇場 / 種別</div>`;
  html += `<div style="position: relative; flex: 1;">`;
  html += `<div style="display: grid; grid-template-columns: repeat(${totalHours}, ${HOUR_W}px);">`;
  for (let h = START_HOUR; h < END_HOUR; h++) {
    const label = h >= 24 ? `${h-24}:00` : `${h}:00`;
    html += `<div class="hour-tick">${label}</div>`;
  }
  html += `</div></div></div>`;

  let lastArea = null;

  theaters.forEach(theater => {
    const rows = buildTheaterRows(theater);
    if (rows.length === 0) return;

    const isFirstInArea = theater.area !== lastArea;
    const showAreaLabel = isFirstInArea;

    rows.forEach((row, rIdx) => {
      const isFirstRow = rIdx === 0;
      const rowH = isFirstRow ? ROW_H_FIRST : ROW_H_NORMAL;

      let borderClass = '';
      if (isFirstRow) {
        if (isFirstInArea && lastArea !== null) {
          borderClass = 'area-divider';
        } else if (!isFirstInArea) {
          borderClass = 'theater-divider';
        }
      } else {
        borderClass = 'row-line';
      }

      html += `<div class="${borderClass}" style="display: flex; min-width: ${chartWidth}px; height: ${rowH}px;">`;
      html += `<div class="row-area-cell" style="height: ${rowH}px;">`;
      if (showAreaLabel && isFirstRow) {
        html += `${theater.area}`;
      }
      html += `</div>`;
      html += `<div class="row-theater-cell" style="height: ${rowH}px;">`;
      if (isFirstRow) {
        html += `<span class="row-theater">${theater.theater}</span>`;
      } else {
        html += `<span class="row-theater"></span>`;
      }
      html += `<span class="kind-badge">${row.kind}</span>`;
      html += `</div>`;
      html += `<div class="bar-area" style="height: ${rowH}px;">`;
      html += stageBgHtml();
      if (isFirstRow) {
        html += `<div class="theater-watermark">${theater.theater}</div>`;
      }
      for (let h = 1; h < totalHours; h++) {
        html += `<div style="position: absolute; left: ${h * HOUR_W}px; top: 0; bottom: 0; width: 0; border-left: 0.5px dashed var(--color-border-tertiary); z-index: 1;"></div>`;
      }
      // 1行目: ラベル(上8px+padding4px=12px)の下にバー、それ以外は中央
      const barTop = isFirstRow ? 18 : Math.round((rowH - BAR_H) / 2);
      row.shows.forEach(p => {
        const sMin = toMin(p.start) - START_HOUR * 60;
        const eMin = toMin(p.end) - START_HOUR * 60;
        const left = (sMin / 60) * HOUR_W;
        const width = Math.max(((eMin - sMin) / 60) * HOUR_W, 28);
        const color = COLORS[p.type] || COLORS['通常'];
        const suffix = p.type === '通常' ? '' : `（${p.type}）`;
        const labelText = `${p.start}${suffix}`;
        const tipText = `${theater.theater}\n${p.start}-${p.end}${suffix}`;
        html += `<div class="bar" data-tip="${tipText.replace(/"/g, '&quot;')}" style="left: ${left}px; width: ${width}px; top: ${barTop}px; background: ${color};">`;
        html += `<span class="bar-label">${labelText}</span>`;
        html += `</div>`;
      });
      html += `</div></div>`;
    });
    lastArea = theater.area;
  });

  if (theaters.length === 0) {
    html += `<div style="padding: 2rem; text-align: center; color: var(--color-text-tertiary); font-size: 13px;">表示する劇場がありません。</div>`;
  }

  chart.innerHTML = html;

  const tip = document.getElementById('tip');
  chart.querySelectorAll('.bar').forEach(bar => {
    bar.addEventListener('mouseenter', () => {
      tip.textContent = bar.dataset.tip;
      tip.style.whiteSpace = 'pre-line';
      tip.style.display = 'block';
    });
    bar.addEventListener('mousemove', e => {
      tip.style.left = (e.pageX + 12) + 'px';
      tip.style.top = (e.pageY + 12) + 'px';
    });
    bar.addEventListener('mouseleave', () => { tip.style.display = 'none'; });
  });
}

function renderFilters() {
  const wrap = document.getElementById('filters');
  let html = `<div class="filter-panel" aria-label="地域フィルター">`;
  html += `<div class="area-toolbar">`;
  html += `<button class="area-link" id="all-on" type="button">全表示</button>`;
  html += `<span class="area-slash">/</span>`;
  html += `<button class="area-link" id="all-off" type="button">全解除</button>`;
  html += `</div>`;
  html += `<div class="area-check-row">`;
  html += AREA_ORDER.map(a =>
    `<label class="area-check"><input type="checkbox" data-area="${a}" ${activeAreas.has(a) ? 'checked' : ''}><span>${a}</span></label>`
  ).join('');
  html += `</div>`;
  html += `</div>`;
  wrap.innerHTML = html;

  wrap.querySelectorAll('[data-area]').forEach(input => {
    input.addEventListener('change', () => {
      const a = input.dataset.area;
      if (input.checked) activeAreas.add(a); else activeAreas.delete(a);
      render();
    });
  });
  document.getElementById('all-on').addEventListener('click', () => {
    activeAreas = new Set(AREA_ORDER); renderFilters(); render();
  });
  document.getElementById('all-off').addEventListener('click', () => {
    activeAreas = new Set(); renderFilters(); render();
  });
}

document.getElementById('tab29').addEventListener('click', () => {
  currentDay = '4/29';
  document.getElementById('tab29').classList.add('active');
  document.getElementById('tab29').setAttribute('aria-selected', 'true');
  document.getElementById('tab30').classList.remove('active');
  document.getElementById('tab30').setAttribute('aria-selected', 'false');
  render();
});
document.getElementById('tab30').addEventListener('click', () => {
  currentDay = '4/30';
  document.getElementById('tab30').classList.add('active');
  document.getElementById('tab30').setAttribute('aria-selected', 'true');
  document.getElementById('tab29').classList.remove('active');
  document.getElementById('tab29').setAttribute('aria-selected', 'false');
  render();
});

renderFilters();
render();
</script>
